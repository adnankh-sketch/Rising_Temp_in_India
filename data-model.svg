<svg viewBox="0 0 1000 340" xmlns="http://www.w3.org/2000/svg" width="1000" height="340">
  <defs>
    <linearGradient id="areaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="coldArea" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#74B9FF;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#74B9FF;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="340" rx="12" fill="#0A1628"/>

  <!-- Title -->
  <text x="40" y="38" font-family="'Segoe UI', system-ui, sans-serif" font-size="17" font-weight="700" fill="#FFFFFF">Seasonal Temperature Pattern — All-India Monthly Average (°C)</text>
  <text x="40" y="58" font-family="'Segoe UI', sans-serif" font-size="12" fill="#8DA6C8">Avg max temperature across all 96 cities · 2020–2025 aggregated</text>

  <!-- Chart area: x=80 to x=960, y=75 to y=270 -->
  <!-- Y axis: 15°C → 40°C (range 25), height 195px → 7.8px per degree -->
  <!-- Y-axis labels -->
  <g font-family="'Segoe UI', sans-serif" font-size="11" fill="#4A6080" text-anchor="end">
    <text x="70" y="79">40°</text>
    <text x="70" y="118">35°</text>
    <text x="70" y="157">30°</text>
    <text x="70" y="196">25°</text>
    <text x="70" y="235">20°</text>
    <text x="70" y="274">15°</text>
  </g>
  <!-- Grid lines -->
  <g stroke="#1E3A5F" stroke-width="0.5" stroke-dasharray="5,5">
    <line x1="80" y1="75" x2="960" y2="75"/>
    <line x1="80" y1="114" x2="960" y2="114"/>
    <line x1="80" y1="153" x2="960" y2="153"/>
    <line x1="80" y1="192" x2="960" y2="192"/>
    <line x1="80" y1="231" x2="960" y2="231"/>
    <line x1="80" y1="270" x2="960" y2="270"/>
  </g>
  <!-- Y axis line -->
  <line x1="80" y1="75" x2="80" y2="270" stroke="#2D3E57" stroke-width="1"/>

  <!-- 
    Data points (avg max):
    Jan=25.23, Feb=29.11, Mar=33.11, Apr=36.67, May=36.87, Jun=35.44
    Jul=32.21, Aug=31.87, Sep=31.97, Oct=31.74, Nov=29.14, Dec=26.36
    
    x per month: 73px spacing starting at 116
    y = 270 - (val - 15) * 7.8
    Jan: 270-(25.23-15)*7.8 = 270-79.8 = 190.2 → 190
    Feb: 270-(29.11-15)*7.8 = 270-110.1 = 159.9 → 160
    Mar: 270-(33.11-15)*7.8 = 270-141.3 = 128.7 → 129
    Apr: 270-(36.67-15)*7.8 = 270-168.8 = 101.2 → 101
    May: 270-(36.87-15)*7.8 = 270-170.4 = 99.6 → 100
    Jun: 270-(35.44-15)*7.8 = 270-159.4 = 110.6 → 111
    Jul: 270-(32.21-15)*7.8 = 270-134.2 = 135.8 → 136
    Aug: 270-(31.87-15)*7.8 = 270-131.6 = 138.4 → 138
    Sep: 270-(31.97-15)*7.8 = 270-132.4 = 137.6 → 138
    Oct: 270-(31.74-15)*7.8 = 270-130.6 = 139.4 → 139
    Nov: 270-(29.14-15)*7.8 = 270-110.3 = 159.7 → 160
    Dec: 270-(26.36-15)*7.8 = 270-88.6 = 181.4 → 181
  -->

  <!-- Filled area under line -->
  <polygon points="116,190 189,160 262,129 335,101 408,100 481,111 554,136 627,138 700,138 773,139 846,160 919,181 919,270 116,270" fill="url(#areaGrad)"/>

  <!-- Main line -->
  <polyline points="116,190 189,160 262,129 335,101 408,100 481,111 554,136 627,138 700,138 773,139 846,160 919,181" fill="none" stroke="#FF6B35" stroke-width="3" stroke-linejoin="round"/>

  <!-- Data point dots -->
  <g fill="#FF6B35">
    <circle cx="116" cy="190" r="5"/>
    <circle cx="189" cy="160" r="5"/>
    <circle cx="262" cy="129" r="5"/>
    <circle cx="335" cy="101" r="6" fill="#FF4757"/>
    <circle cx="408" cy="100" r="7" fill="#FF2D44"/>
    <circle cx="481" cy="111" r="5"/>
    <circle cx="554" cy="136" r="5"/>
    <circle cx="627" cy="138" r="5"/>
    <circle cx="700" cy="138" r="5"/>
    <circle cx="773" cy="139" r="5"/>
    <circle cx="846" cy="160" r="5"/>
    <circle cx="919" cy="181" r="5"/>
  </g>

  <!-- Value labels on key points -->
  <g font-family="'Segoe UI', sans-serif" font-size="11" font-weight="600" fill="#FF6B35">
    <text x="116" y="185" text-anchor="middle">25.2</text>
    <text x="335" y="93" text-anchor="middle" fill="#FF2D44">36.7</text>
    <text x="408" y="91" text-anchor="middle" fill="#FF2D44">🔥 36.9</text>
    <text x="919" y="175" text-anchor="middle">26.4</text>
  </g>

  <!-- Month labels -->
  <g font-family="'Segoe UI', sans-serif" font-size="11" fill="#8DA6C8" text-anchor="middle">
    <text x="116" y="290">Jan</text>
    <text x="189" y="290">Feb</text>
    <text x="262" y="290">Mar</text>
    <text x="335" y="290">Apr</text>
    <text x="408" y="290">May</text>
    <text x="481" y="290">Jun</text>
    <text x="554" y="290">Jul</text>
    <text x="627" y="290">Aug</text>
    <text x="700" y="290">Sep</text>
    <text x="773" y="290">Oct</text>
    <text x="846" y="290">Nov</text>
    <text x="919" y="290">Dec</text>
  </g>

  <!-- Season bands labels -->
  <text x="224" y="310" font-family="'Segoe UI', sans-serif" font-size="10" fill="#74B9FF" text-anchor="middle">❄️ Winter</text>
  <text x="371" y="310" font-family="'Segoe UI', sans-serif" font-size="10" fill="#FF6B35" text-anchor="middle">☀️ Pre-Monsoon</text>
  <text x="626" y="310" font-family="'Segoe UI', sans-serif" font-size="10" fill="#55EFC4" text-anchor="middle">🌧️ Monsoon</text>
  <text x="846" y="310" font-family="'Segoe UI', sans-serif" font-size="10" fill="#F7B731" text-anchor="middle">🍂 Post-Monsoon</text>

  <!-- Annotation: Peak -->
  <line x1="408" y1="100" x2="450" y2="82" stroke="#FF2D44" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="452" y="80" font-family="'Segoe UI', sans-serif" font-size="10" fill="#FF2D44">National Peak</text>

  <!-- Legend bottom right -->
  <circle cx="830" cy="322" r="5" fill="#FF6B35"/>
  <text x="840" y="326" font-family="'Segoe UI', sans-serif" font-size="11" fill="#8DA6C8">Avg Max Temp (°C) — All 96 Cities</text>
</svg>
