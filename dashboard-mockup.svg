<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" width="800" height="320">
  <rect width="800" height="320" rx="12" fill="#0A1628"/>
  
  <!-- Title -->
  <text x="400" y="34" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="700" fill="#FFFFFF" text-anchor="middle">Data Model — Single Flat Table Architecture</text>

  <!-- CSV Source -->
  <rect x="40" y="55" width="180" height="220" rx="8" fill="#0E2040" stroke="#F7B731" stroke-width="1.5"/>
  <rect x="40" y="55" width="180" height="32" rx="8" fill="#F7B731" fill-opacity="0.2"/>
  <text x="130" y="77" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#F7B731" text-anchor="middle">📄 CSV Source</text>
  <text x="130" y="94" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8DA6C8" text-anchor="middle">popular_cities_weather.csv</text>
  <g font-family="'Segoe UI', sans-serif" font-size="11" fill="#FFFFFF">
    <text x="56" y="114">date</text><text x="208" y="114" text-anchor="end" fill="#8DA6C8" font-size="10">text</text>
    <line x1="56" y1="118" x2="208" y2="118" stroke="#1E3A5F" stroke-width="0.5"/>
    <text x="56" y="134">tavg</text><text x="208" y="134" text-anchor="end" fill="#74B9FF" font-size="10">decimal</text>
    <line x1="56" y1="138" x2="208" y2="138" stroke="#1E3A5F" stroke-width="0.5"/>
    <text x="56" y="154">tmin</text><text x="208" y="154" text-anchor="end" fill="#74B9FF" font-size="10">decimal</text>
    <line x1="56" y1="158" x2="208" y2="158" stroke="#1E3A5F" stroke-width="0.5"/>
    <text x="56" y="174">tmax</text><text x="208" y="174" text-anchor="end" fill="#FF6B35" font-size="10">decimal</text>
    <line x1="56" y1="178" x2="208" y2="178" stroke="#1E3A5F" stroke-width="0.5"/>
    <text x="56" y="194">prcp</text><text x="208" y="194" text-anchor="end" fill="#8DA6C8" font-size="10">integer</text>
    <line x1="56" y1="198" x2="208" y2="198" stroke="#1E3A5F" stroke-width="0.5"/>
    <text x="56" y="214">wspd</text><text x="208" y="214" text-anchor="end" fill="#8DA6C8" font-size="10">decimal</text>
    <line x1="56" y1="218" x2="208" y2="218" stroke="#1E3A5F" stroke-width="0.5"/>
    <text x="56" y="234">pres</text><text x="208" y="234" text-anchor="end" fill="#8DA6C8" font-size="10">decimal</text>
    <line x1="56" y1="238" x2="208" y2="238" stroke="#1E3A5F" stroke-width="0.5"/>
    <text x="56" y="254">tsun</text><text x="208" y="254" text-anchor="end" fill="#8DA6C8" font-size="10">integer</text>
    <line x1="56" y1="258" x2="208" y2="258" stroke="#1E3A5F" stroke-width="0.5"/>
    <text x="56" y="270">city</text><text x="208" y="270" text-anchor="end" fill="#55EFC4" font-size="10">text</text>
  </g>

  <!-- Arrow -->
  <line x1="220" y1="165" x2="310" y2="165" stroke="#F7B731" stroke-width="2"/>
  <polygon points="308,160 320,165 308,170" fill="#F7B731"/>
  <text x="265" y="155" font-family="'Segoe UI', sans-serif" font-size="10" fill="#F7B731" text-anchor="middle">Power Query</text>
  <text x="265" y="180" font-family="'Segoe UI', sans-serif" font-size="9" fill="#8DA6C8" text-anchor="middle">Transform &amp; Load</text>

  <!-- Weather Table (after transformation) -->
  <rect x="320" y="55" width="200" height="250" rx="8" fill="#0E2040" stroke="#55EFC4" stroke-width="2"/>
  <rect x="320" y="55" width="200" height="32" rx="8" fill="#55EFC4" fill-opacity="0.15"/>
  <text x="420" y="77" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#55EFC4" text-anchor="middle">⚡ weather (Table)</text>
  <text x="420" y="94" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8DA6C8" text-anchor="middle">7,056 rows · Power Query</text>
  <g font-family="'Segoe UI', sans-serif" font-size="11" fill="#FFFFFF">
    <text x="336" y="114">date</text><text x="508" y="114" text-anchor="end" fill="#8DA6C8" font-size="10">date</text>
    <line x1="336" y1="118" x2="508" y2="118" stroke="#1E3A5F" stroke-width="0.5"/>
    <text x="336" y="134" fill="#A29BFE">Year</text><text x="508" y="134" text-anchor="end" fill="#A29BFE" font-size="10">integer ✨</text>
    <line x1="336" y1="138" x2="508" y2="138" stroke="#1E3A5F" stroke-width="0.5"/>
    <text x="336" y="154" fill="#A29BFE">Month</text><text x="508" y="154" text-anchor="end" fill="#A29BFE" font-size="10">text ✨</text>
    <line x1="336" y1="158" x2="508" y2="158" stroke="#1E3A5F" stroke-width="0.5"/>
    <text x="336" y="174" fill="#A29BFE">Month Number</text><text x="508" y="174" text-anchor="end" fill="#A29BFE" font-size="10">int ✨</text>
    <line x1="336" y1="178" x2="508" y2="178" stroke="#1E3A5F" stroke-width="0.5"/>
    <text x="336" y="194">tavg</text><text x="508" y="194" text-anchor="end" fill="#74B9FF" font-size="10">decimal</text>
    <line x1="336" y1="198" x2="508" y2="198" stroke="#1E3A5F" stroke-width="0.5"/>
    <text x="336" y="214">tmin</text><text x="508" y="214" text-anchor="end" fill="#74B9FF" font-size="10">decimal</text>
    <line x1="336" y1="218" x2="508" y2="218" stroke="#1E3A5F" stroke-width="0.5"/>
    <text x="336" y="234">tmax</text><text x="508" y="234" text-anchor="end" fill="#FF6B35" font-size="10">decimal</text>
    <line x1="336" y1="238" x2="508" y2="238" stroke="#1E3A5F" stroke-width="0.5"/>
    <text x="336" y="254">prcp / wspd / pres</text><text x="508" y="254" text-anchor="end" fill="#8DA6C8" font-size="10">various</text>
    <line x1="336" y1="258" x2="508" y2="258" stroke="#1E3A5F" stroke-width="0.5"/>
    <text x="336" y="278">tsun</text><text x="508" y="278" text-anchor="end" fill="#8DA6C8" font-size="10">integer</text>
    <line x1="336" y1="282" x2="508" y2="282" stroke="#1E3A5F" stroke-width="0.5"/>
    <text x="336" y="298">city</text><text x="508" y="298" text-anchor="end" fill="#55EFC4" font-size="10">text</text>
  </g>

  <!-- Arrow to DAX -->
  <line x1="520" y1="165" x2="590" y2="165" stroke="#A29BFE" stroke-width="2"/>
  <polygon points="588,160 600,165 588,170" fill="#A29BFE"/>
  <text x="555" y="155" font-family="'Segoe UI', sans-serif" font-size="10" fill="#A29BFE" text-anchor="middle">DAX</text>
  <text x="555" y="180" font-family="'Segoe UI', sans-serif" font-size="9" fill="#8DA6C8" text-anchor="middle">Measures</text>

  <!-- DAX Measures box -->
  <rect x="600" y="55" width="180" height="220" rx="8" fill="#0E2040" stroke="#A29BFE" stroke-width="1.5"/>
  <rect x="600" y="55" width="180" height="32" rx="8" fill="#A29BFE" fill-opacity="0.15"/>
  <text x="690" y="77" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#A29BFE" text-anchor="middle">📐 DAX Measures</text>
  <text x="690" y="94" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8DA6C8" text-anchor="middle">KPI calculations</text>
  <g font-family="'Segoe UI', sans-serif" font-size="10" fill="#8DA6C8">
    <text x="614" y="114">TMAX Card</text>
    <line x1="614" y1="118" x2="768" y2="118" stroke="#1E3A5F" stroke-width="0.5"/>
    <text x="614" y="134">TMIN Card</text>
    <line x1="614" y1="138" x2="768" y2="138" stroke="#1E3A5F" stroke-width="0.5"/>
    <text x="614" y="154">Tavg Card</text>
    <line x1="614" y1="158" x2="768" y2="158" stroke="#1E3A5F" stroke-width="0.5"/>
    <text x="614" y="174">Hottest City Card</text>
    <line x1="614" y1="178" x2="768" y2="178" stroke="#1E3A5F" stroke-width="0.5"/>
    <text x="614" y="194">Warmest Month Card</text>
    <line x1="614" y1="198" x2="768" y2="198" stroke="#1E3A5F" stroke-width="0.5"/>
    <text x="614" y="214">Coldest Month</text>
    <line x1="614" y1="218" x2="768" y2="218" stroke="#1E3A5F" stroke-width="0.5"/>
    <text x="614" y="234">Count Records</text>
  </g>

  <!-- Legend bottom -->
  <g transform="translate(40, 290)">
    <circle cx="0" cy="0" r="5" fill="#A29BFE"/>
    <text x="10" y="4" font-family="'Segoe UI', sans-serif" font-size="10" fill="#A29BFE">✨ Derived column (Power Query)</text>
    <circle cx="250" cy="0" r="5" fill="#FF6B35"/>
    <text x="260" y="4" font-family="'Segoe UI', sans-serif" font-size="10" fill="#FF6B35">tmax — Primary KPI driver</text>
  </g>
</svg>
