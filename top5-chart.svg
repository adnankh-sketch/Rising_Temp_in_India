<svg viewBox="0 0 1000 220" xmlns="http://www.w3.org/2000/svg" width="1000" height="220">
  <rect width="1000" height="220" rx="12" fill="#0A1628"/>
  <text x="500" y="30" font-family="'Segoe UI', system-ui, sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">Dashboard Visual Inventory</text>

  <!-- Visual 1: Line Chart -->
  <rect x="20" y="45" width="130" height="120" rx="8" fill="#0E2040" stroke="#FF6B35" stroke-width="1.5"/>
  <text x="85" y="65" font-family="'Segoe UI', sans-serif" font-size="10" fill="#FF6B35" text-anchor="middle">📈 LINE CHART</text>
  <polyline points="35,140 55,120 75,100 95,95 115,110 130,130" fill="none" stroke="#FF6B35" stroke-width="2"/>
  <text x="85" y="160" font-family="'Segoe UI', sans-serif" font-size="9" fill="#8DA6C8" text-anchor="middle">Monthly Trend</text>

  <!-- Visual 2: Bar Chart -->
  <rect x="160" y="45" width="130" height="120" rx="8" fill="#0E2040" stroke="#F7B731" stroke-width="1.5"/>
  <text x="225" y="65" font-family="'Segoe UI', sans-serif" font-size="10" fill="#F7B731" text-anchor="middle">📊 BAR CHART</text>
  <g fill="#F7B731" fill-opacity="0.8">
    <rect x="175" y="135" width="18" height="20"/>
    <rect x="198" y="120" width="18" height="35"/>
    <rect x="221" y="110" width="18" height="45"/>
    <rect x="244" y="105" width="18" height="50"/>
    <rect x="267" y="100" width="18" height="55"/>
  </g>
  <text x="225" y="160" font-family="'Segoe UI', sans-serif" font-size="9" fill="#8DA6C8" text-anchor="middle">Top 5 Cities</text>

  <!-- Visual 3: Map -->
  <rect x="300" y="45" width="130" height="120" rx="8" fill="#0E2040" stroke="#55EFC4" stroke-width="1.5"/>
  <text x="365" y="65" font-family="'Segoe UI', sans-serif" font-size="10" fill="#55EFC4" text-anchor="middle">🗺️ MAP VISUAL</text>
  <polygon points="345,80 380,75 410,85 420,110 415,135 395,150 375,155 355,148 335,130 330,105" fill="#1E3A5F" stroke="#2D5F8A" stroke-width="1"/>
  <circle cx="370" cy="95" r="5" fill="#FF4757" opacity="0.8"/>
  <circle cx="355" cy="120" r="7" fill="#FF6B35" opacity="0.7"/>
  <circle cx="395" cy="130" r="9" fill="#FF6B35" opacity="0.9"/>
  <text x="365" y="170" font-family="'Segoe UI', sans-serif" font-size="9" fill="#8DA6C8" text-anchor="middle">Temperature Map</text>

  <!-- Visual 4: Table -->
  <rect x="440" y="45" width="130" height="120" rx="8" fill="#0E2040" stroke="#74B9FF" stroke-width="1.5"/>
  <text x="505" y="65" font-family="'Segoe UI', sans-serif" font-size="10" fill="#74B9FF" text-anchor="middle">📋 TABLE</text>
  <rect x="455" y="75" width="100" height="14" fill="#0A2840"/>
  <g font-family="'Segoe UI', sans-serif" font-size="8" fill="#8DA6C8">
    <text x="458" y="85">City</text><text x="540" y="85" text-anchor="end">Avg Max</text>
    <line x1="455" y1="89" x2="555" y2="89" stroke="#1E3A5F" stroke-width="0.5"/>
    <text x="458" y="100">Trichy</text><text x="540" y="100" text-anchor="end" fill="#FF6B35">34.8</text>
    <text x="458" y="112">Ahmedabad</text><text x="540" y="112" text-anchor="end" fill="#FF8C50">34.4</text>
    <text x="458" y="124">Madurai</text><text x="540" y="124" text-anchor="end" fill="#FF8C50">34.4</text>
    <text x="458" y="136">Bikaner</text><text x="540" y="136" text-anchor="end" fill="#FFA070">34.2</text>
    <text x="458" y="148" fill="#4A6080">...</text>
  </g>
  <text x="505" y="165" font-family="'Segoe UI', sans-serif" font-size="9" fill="#8DA6C8" text-anchor="middle">City Summary</text>

  <!-- Visual 5: KPI Cards -->
  <rect x="580" y="45" width="130" height="120" rx="8" fill="#0E2040" stroke="#A29BFE" stroke-width="1.5"/>
  <text x="645" y="65" font-family="'Segoe UI', sans-serif" font-size="10" fill="#A29BFE" text-anchor="middle">🎯 KPI CARDS</text>
  <rect x="595" y="72" width="52" height="38" rx="4" fill="#0A1628" stroke="#FF6B35" stroke-width="1"/>
  <text x="621" y="90" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="800" fill="#FF6B35" text-anchor="middle">36.9°</text>
  <text x="621" y="103" font-family="'Segoe UI', sans-serif" font-size="7" fill="#8DA6C8" text-anchor="middle">MAX TEMP</text>
  <rect x="655" y="72" width="48" height="38" rx="4" fill="#0A1628" stroke="#74B9FF" stroke-width="1"/>
  <text x="679" y="90" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="800" fill="#74B9FF" text-anchor="middle">8.3°</text>
  <text x="679" y="103" font-family="'Segoe UI', sans-serif" font-size="7" fill="#8DA6C8" text-anchor="middle">MIN TEMP</text>
  <rect x="595" y="116" width="108" height="28" rx="4" fill="#0A1628" stroke="#F7B731" stroke-width="1"/>
  <text x="649" y="133" font-family="'Segoe UI', sans-serif" font-size="11" font-weight="700" fill="#F7B731" text-anchor="middle">6 KPI Cards total</text>
  <text x="645" y="165" font-family="'Segoe UI', sans-serif" font-size="9" fill="#8DA6C8" text-anchor="middle">Metrics Panel</text>

  <!-- Visual 6: Slicers -->
  <rect x="720" y="45" width="130" height="120" rx="8" fill="#0E2040" stroke="#FD79A8" stroke-width="1.5"/>
  <text x="785" y="65" font-family="'Segoe UI', sans-serif" font-size="10" fill="#FD79A8" text-anchor="middle">🎛️ SLICERS</text>
  <rect x="735" y="75" width="100" height="20" rx="4" fill="#0A1628" stroke="#FD79A8" stroke-width="0.8"/>
  <text x="785" y="89" font-family="'Segoe UI', sans-serif" font-size="9" fill="#8DA6C8" text-anchor="middle">📅 Date Range</text>
  <rect x="735" y="100" width="100" height="20" rx="4" fill="#0A1628" stroke="#FD79A8" stroke-width="0.8"/>
  <text x="785" y="114" font-family="'Segoe UI', sans-serif" font-size="9" fill="#8DA6C8" text-anchor="middle">🏙️ City Filter</text>
  <rect x="735" y="125" width="100" height="20" rx="4" fill="#0A1628" stroke="#FD79A8" stroke-width="0.8"/>
  <text x="785" y="139" font-family="'Segoe UI', sans-serif" font-size="9" fill="#8DA6C8" text-anchor="middle">📆 Year Filter</text>
  <text x="785" y="165" font-family="'Segoe UI', sans-serif" font-size="9" fill="#8DA6C8" text-anchor="middle">3 Interactive Filters</text>

  <!-- Visual 7: Icons/Images -->
  <rect x="860" y="45" width="125" height="120" rx="8" fill="#0E2040" stroke="#DFE6E9" stroke-width="1.5"/>
  <text x="922" y="65" font-family="'Segoe UI', sans-serif" font-size="10" fill="#B2BEC3" text-anchor="middle">🖼️ ICONS</text>
  <text x="905" y="105" font-family="'Segoe UI', sans-serif" font-size="26" text-anchor="middle">🔥</text>
  <text x="938" y="105" font-family="'Segoe UI', sans-serif" font-size="26" text-anchor="middle">☀️</text>
  <text x="905" y="140" font-family="'Segoe UI', sans-serif" font-size="26" text-anchor="middle">❄️</text>
  <text x="938" y="140" font-family="'Segoe UI', sans-serif" font-size="26" text-anchor="middle">📅</text>
  <text x="922" y="165" font-family="'Segoe UI', sans-serif" font-size="9" fill="#8DA6C8" text-anchor="middle">Custom Decorations</text>

  <!-- Bottom count bar -->
  <rect x="20" y="178" width="960" height="32" rx="6" fill="#0E2040"/>
  <g font-family="'Segoe UI', sans-serif" font-size="11" fill="#8DA6C8" text-anchor="middle">
    <text x="85" y="199">1 Line Chart</text>
    <line x1="155" y1="185" x2="155" y2="205" stroke="#2D3E57" stroke-width="1"/>
    <text x="225" y="199">1 Bar Chart</text>
    <line x1="295" y1="185" x2="295" y2="205" stroke="#2D3E57" stroke-width="1"/>
    <text x="365" y="199">1 Map</text>
    <line x1="435" y1="185" x2="435" y2="205" stroke="#2D3E57" stroke-width="1"/>
    <text x="505" y="199">1 Table</text>
    <line x1="575" y1="185" x2="575" y2="205" stroke="#2D3E57" stroke-width="1"/>
    <text x="645" y="199">6 KPI Cards</text>
    <line x1="715" y1="185" x2="715" y2="205" stroke="#2D3E57" stroke-width="1"/>
    <text x="785" y="199">3 Slicers</text>
    <line x1="855" y1="185" x2="855" y2="205" stroke="#2D3E57" stroke-width="1"/>
    <text x="922" y="199">Icons &amp; Shapes</text>
  </g>
</svg>
