    <text x="215" y="425">Apr</text><text x="255" y="425">May</text><text x="295" y="425">Jun</text>
    <text x="335" y="425">Jul</text><text x="375" y="425">Aug</text><text x="415" y="425">Sep</text>
    <text x="455" y="425">Oct</text><text x="495" y="425">Nov</text><text x="540" y="425">Dec</text>
  </g>
  <!-- Line 2024 (hottest) -->
  <polyline points="95,360 135,334 175,298 215,278 255,260 295,280 335,295 375,300 415,302 455,302 495,318 540,355" fill="none" stroke="#FF6B35" stroke-width="2.5"/>
  <!-- Line 2023 -->
  <polyline points="95,365 135,338 175,302 215,282 255,265 295,285 335,298 375,302 415,305 455,305 495,322 540,360" fill="none" stroke="#F7B731" stroke-width="2"/>
  <!-- Line 2020 -->
  <polyline points="95,368 135,340 175,305 215,283 255,267 295,287 335,300 375,303 415,305 455,307 495,325 540,362" fill="none" stroke="#74B9FF" stroke-width="2"/>
