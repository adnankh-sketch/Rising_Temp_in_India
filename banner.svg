<svg viewBox="0 0 1200 680" xmlns="http://www.w3.org/2000/svg" width="1200" height="680">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1B35"/>
      <stop offset="100%" style="stop-color:#1A1A40"/>
    </linearGradient>
    <linearGradient id="heatBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="100%" style="stop-color:#F7B731"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#FF6B35;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="lineGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F7B731;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#F7B731;stop-opacity:0"/>
    </linearGradient>
    <clipPath id="chartClip">
      <rect x="0" y="0" width="520" height="200"/>
    </clipPath>
  </defs>

  <!-- Page background -->
  <rect width="1200" height="680" rx="12" fill="url(#bg)"/>
  
  <!-- Browser chrome -->
  <rect width="1200" height="36" rx="0" fill="#0A1525"/>
  <circle cx="20" cy="18" r="6" fill="#FF5F57"/>
  <circle cx="40" cy="18" r="6" fill="#FEBC2E"/>
  <circle cx="60" cy="18" r="6" fill="#28C840"/>
  <text x="600" y="23" font-family="'Segoe UI', sans-serif" font-size="12" fill="#8DA6C8" text-anchor="middle">India Weather Analytics Dashboard — Power BI</text>

  <!-- Header bar -->
  <rect x="0" y="36" width="1200" height="56" fill="#0E2040"/>
  <text x="24" y="72" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">🌡️ HOW MUCH HOTTER / COLDER HAS INDIA GOTTEN?</text>
  <text x="1000" y="68" font-family="'Segoe UI', sans-serif" font-size="12" fill="#8DA6C8">Jan 2020 – Dec 2025</text>

  <!-- ===== TOP ROW: KPI Cards ===== -->
  <!-- Card 1: Hottest City -->
  <rect x="16" y="104" width="174" height="88" rx="8" fill="#0A1628" stroke="#FF6B35" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="103" y="126" font-family="'Segoe UI', sans-serif" font-size="10" fill="#FF8C50" text-anchor="middle" letter-spacing="1">🔥 HOTTEST CITY</text>
  <text x="103" y="158" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">Tiruchirappalli</text>
  <text x="103" y="178" font-family="'Segoe UI', sans-serif" font-size="11" fill="#F7B731" text-anchor="middle">34.8°C avg max</text>

  <!-- Card 2: Max Temp -->
  <rect x="200" y="104" width="145" height="88" rx="8" fill="#0A1628" stroke="#FF4757" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="272" y="126" font-family="'Segoe UI', sans-serif" font-size="10" fill="#FF6B81" text-anchor="middle" letter-spacing="1">MAX TEMP</text>
  <text x="272" y="162" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="800" fill="#FF4757" text-anchor="middle">36.9°C</text>
  <text x="272" y="180" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8DA6C8" text-anchor="middle">National peak (May)</text>

  <!-- Card 3: Min Temp -->
  <rect x="355" y="104" width="145" height="88" rx="8" fill="#0A1628" stroke="#74B9FF" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="427" y="126" font-family="'Segoe UI', sans-serif" font-size="10" fill="#74B9FF" text-anchor="middle" letter-spacing="1">MIN TEMP</text>
  <text x="427" y="162" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="800" fill="#74B9FF" text-anchor="middle">8.3°C</text>
  <text x="427" y="180" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8DA6C8" text-anchor="middle">Srinagar (Jan avg)</text>

  <!-- Card 4: Warmest Month -->
  <rect x="510" y="104" width="145" height="88" rx="8" fill="#0A1628" stroke="#F7B731" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="582" y="126" font-family="'Segoe UI', sans-serif" font-size="10" fill="#F7B731" text-anchor="middle" letter-spacing="1">WARMEST MONTH</text>
  <text x="582" y="162" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="800" fill="#F7B731" text-anchor="middle">May</text>
  <text x="582" y="180" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8DA6C8" text-anchor="middle">Pre-monsoon peak</text>

  <!-- Card 5: Coldest Month -->
  <rect x="665" y="104" width="145" height="88" rx="8" fill="#0A1628" stroke="#A29BFE" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="737" y="126" font-family="'Segoe UI', sans-serif" font-size="10" fill="#A29BFE" text-anchor="middle" letter-spacing="1">COLDEST MONTH</text>
  <text x="737" y="162" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="800" fill="#A29BFE" text-anchor="middle">January</text>
  <text x="737" y="180" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8DA6C8" text-anchor="middle">25.2°C avg max</text>

  <!-- Card 6: Records -->
  <rect x="820" y="104" width="145" height="88" rx="8" fill="#0A1628" stroke="#55EFC4" stroke-width="1.5" stroke-opacity="0.6"/>
  <text x="892" y="126" font-family="'Segoe UI', sans-serif" font-size="10" fill="#55EFC4" text-anchor="middle" letter-spacing="1">RECORDS</text>
  <text x="892" y="162" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="800" fill="#55EFC4" text-anchor="middle">7,056</text>
  <text x="892" y="180" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8DA6C8" text-anchor="middle">96 cities · 72 months</text>

  <!-- Slicers panel (right) -->
  <rect x="975" y="104" width="210" height="88" rx="8" fill="#0A1628" stroke="#2D3E57" stroke-width="1"/>
  <text x="1080" y="125" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8DA6C8" text-anchor="middle" letter-spacing="1">FILTERS</text>
  <rect x="990" y="132" width="175" height="18" rx="4" fill="#0E2040"/>
  <text x="1000" y="145" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8DA6C8">📅 Date: All</text>
  <rect x="990" y="155" width="175" height="18" rx="4" fill="#0E2040"/>
  <text x="1000" y="168" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8DA6C8">🏙️ City: All 96</text>
  <rect x="990" y="178" width="175" height="10" rx="4" fill="#0E2040"/>
  <text x="1000" y="186" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8DA6C8">📆 Year: 2020–2025</text>

  <!-- ===== MAIN ROW ===== -->
  <!-- Line Chart -->
  <rect x="16" y="208" width="600" height="240" rx="8" fill="#0A1628" stroke="#1E3A5F" stroke-width="1"/>
  <text x="30" y="232" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">Monthly Max Temperature Trend by Year</text>
  
  <!-- Y-axis labels -->
  <g font-family="'Segoe UI', sans-serif" font-size="10" fill="#4A6080" text-anchor="end">
    <text x="56" y="262">40°</text>
    <text x="56" y="292">35°</text>
    <text x="56" y="322">30°</text>
    <text x="56" y="352">25°</text>
    <text x="56" y="382">20°</text>
    <text x="56" y="412">15°</text>
  </g>
  <!-- Grid lines -->
  <g stroke="#1E3A5F" stroke-width="0.5" stroke-dasharray="4,4">
    <line x1="62" y1="258" x2="600" y2="258"/>
    <line x1="62" y1="288" x2="600" y2="288"/>
    <line x1="62" y1="318" x2="600" y2="318"/>
    <line x1="62" y1="348" x2="600" y2="348"/>
    <line x1="62" y1="378" x2="600" y2="378"/>
    <line x1="62" y1="408" x2="600" y2="408"/>
