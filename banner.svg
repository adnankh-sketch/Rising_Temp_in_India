  <text x="1086" y="490" font-family="'Segoe UI', sans-serif" font-size="11" fill="#8DA6C8" text-anchor="middle">QUICK STATS</text>
  <g font-family="'Segoe UI', sans-serif" font-size="11" fill="#FFFFFF">
    <text x="1000" y="518">🏙️ Cities</text><text x="1165" y="518" text-anchor="end" fill="#55EFC4">96</text>
    <line x1="1000" y1="525" x2="1175" y2="525" stroke="#1E3A5F" stroke-width="0.5"/>
    <text x="1000" y="544">📊 Records</text><text x="1165" y="544" text-anchor="end" fill="#55EFC4">7,056</text>
    <line x1="1000" y1="551" x2="1175" y2="551" stroke="#1E3A5F" stroke-width="0.5"/>
    <text x="1000" y="570">📅 Years</text><text x="1165" y="570" text-anchor="end" fill="#55EFC4">6</text>
    <line x1="1000" y1="577" x2="1175" y2="577" stroke="#1E3A5F" stroke-width="0.5"/>
    <text x="1000" y="596">🌡️ Max Ever</text><text x="1165" y="596" text-anchor="end" fill="#FF6B35">36.9°C</text>
    <line x1="1000" y1="603" x2="1175" y2="603" stroke="#1E3A5F" stroke-width="0.5"/>
    <text x="1000" y="622">❄️ Min Ever</text><text x="1165" y="622" text-anchor="end" fill="#74B9FF">8.3°C</text>
    <line x1="1000" y1="629" x2="1175" y2="629" stroke="#1E3A5F" stroke-width="0.5"/>
    <text x="1000" y="648">☀️ Sunniest</text><text x="1165" y="648" text-anchor="end" fill="#F7B731">Jhansi</text>
