    <circle cx="0" cy="0" r="4" fill="#FF6B35"/>
    <text x="8" y="4" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8DA6C8">2024</text>
    <circle cx="55" cy="0" r="4" fill="#F7B731"/>
    <text x="63" y="4" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8DA6C8">2023</text>
    <circle cx="110" cy="0" r="4" fill="#74B9FF"/>
    <text x="118" y="4" font-family="'Segoe UI', sans-serif" font-size="10" fill="#8DA6C8">2020</text>
  </g>

