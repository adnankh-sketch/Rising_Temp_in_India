  <circle cx="1065" cy="370" r="10" fill="#FF6B35" opacity="0.7"/> <!-- Mumbai -->
  <circle cx="1100" cy="380" r="14" fill="#FF6B35" opacity="0.9"/> <!-- Chennai/Trichy -->
  <circle cx="1095" cy="355" r="9" fill="#F7B731" opacity="0.7"/> <!-- Hyderabad -->
  <circle cx="1055" cy="285" r="8" fill="#FF8C50" opacity="0.7"/> <!-- Jodhpur -->
  <circle cx="1110" cy="400" r="11" fill="#FF4757" opacity="0.8"/> <!-- Madurai -->
  <text x="1086" y="445" font-family="'Segoe UI', sans-serif" font-size="9" fill="#8DA6C8" text-anchor="middle">Bubble = Avg Max Temp</text>

  <!-- ===== BOTTOM ROW ===== -->
  <!-- City Performance Table -->
  <rect x="16" y="462" width="960" height="200" rx="8" fill="#0A1628" stroke="#1E3A5F" stroke-width="1"/>
  <text x="30" y="486" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">City Performance Summary</text>
  <!-- Table header -->
  <rect x="16" y="494" width="960" height="24" fill="#0E2040"/>
  <g font-family="'Segoe UI', sans-serif" font-size="11" fill="#8DA6C8">
    <text x="40" y="511">City</text>
    <text x="280" y="511">Avg Max (°C)</text>
    <text x="440" y="511">Avg Min (°C)</text>
    <text x="600" y="511">Avg Temp (°C)</text>
    <text x="760" y="511">Peak Month</text>
    <text x="900" y="511">Coldest Month</text>
  </g>
  <!-- Table rows -->
  <g font-family="'Segoe UI', sans-serif" font-size="11">
    <rect x="16" y="518" width="960" height="22" fill="#0C1D36" fill-opacity="0.5"/>
    <text x="40" y="533" fill="#FFFFFF">Tiruchirappalli</text>
    <text x="310" y="533" fill="#FF6B35" text-anchor="middle">34.80</text>
    <text x="468" y="533" fill="#74B9FF" text-anchor="middle">24.90</text>
    <text x="635" y="533" fill="#F7B731" text-anchor="middle">29.23</text>
    <text x="790" y="533" fill="#8DA6C8" text-anchor="middle">May</text>
    <text x="945" y="533" fill="#8DA6C8" text-anchor="middle">January</text>

    <text x="40" y="555" fill="#FFFFFF">Ahmedabad</text>
    <text x="310" y="555" fill="#FF8C50" text-anchor="middle">34.43</text>
    <text x="468" y="555" fill="#74B9FF" text-anchor="middle">18.40</text>
    <text x="635" y="555" fill="#F7B731" text-anchor="middle">26.75</text>
    <text x="790" y="555" fill="#8DA6C8" text-anchor="middle">May</text>
    <text x="945" y="555" fill="#8DA6C8" text-anchor="middle">January</text>

    <rect x="16" y="560" width="960" height="22" fill="#0C1D36" fill-opacity="0.5"/>
    <text x="40" y="575" fill="#FFFFFF">Madurai</text>
    <text x="310" y="575" fill="#FF8C50" text-anchor="middle">34.40</text>
    <text x="468" y="575" fill="#74B9FF" text-anchor="middle">23.10</text>
    <text x="635" y="575" fill="#F7B731" text-anchor="middle">28.52</text>
    <text x="790" y="575" fill="#8DA6C8" text-anchor="middle">April</text>
    <text x="945" y="575" fill="#8DA6C8" text-anchor="middle">December</text>

    <text x="40" y="597" fill="#FFFFFF">Srinagar</text>
    <text x="310" y="597" fill="#74B9FF" text-anchor="middle">20.96</text>
    <text x="468" y="597" fill="#74B9FF" text-anchor="middle">8.25</text>
    <text x="635" y="597" fill="#74B9FF" text-anchor="middle">14.55</text>
    <text x="790" y="597" fill="#8DA6C8" text-anchor="middle">July</text>
    <text x="945" y="597" fill="#8DA6C8" text-anchor="middle">January</text>

    <rect x="16" y="601" width="960" height="22" fill="#0C1D36" fill-opacity="0.5"/>
    <text x="40" y="616" fill="#FFFFFF">Shimla</text>
    <text x="310" y="616" fill="#74B9FF" text-anchor="middle">22.00</text>
    <text x="468" y="616" fill="#74B9FF" text-anchor="middle">11.20</text>
    <text x="635" y="616" fill="#74B9FF" text-anchor="middle">16.06</text>
    <text x="790" y="616" fill="#8DA6C8" text-anchor="middle">July</text>
    <text x="945" y="616" fill="#8DA6C8" text-anchor="middle">January</text>

    <text x="40" y="638" fill="#4A6080">... and 91 more cities</text>
  </g>

  <!-- Footer label -->
