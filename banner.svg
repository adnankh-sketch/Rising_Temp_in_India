    <!-- Tiruchirappalli -->
    <rect x="0" y="0" width="290" height="28" rx="4" fill="url(#heatBar)" opacity="0.9"/>
    <text x="295" y="19" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#F7B731">34.8</text>
    <text x="-2" y="19" font-family="'Segoe UI', sans-serif" font-size="10" fill="#FFFFFF">Tiruchirappalli</text>
    <!-- Ahmedabad -->
    <rect x="0" y="36" width="280" height="28" rx="4" fill="#FF6B35" fill-opacity="0.8"/>
    <text x="285" y="55" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#F7B731">34.4</text>
    <text x="-2" y="55" font-family="'Segoe UI', sans-serif" font-size="10" fill="#FFFFFF">Ahmedabad</text>
    <!-- Madurai -->
    <rect x="0" y="72" width="278" height="28" rx="4" fill="#FF6B35" fill-opacity="0.6"/>
    <text x="283" y="91" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#F7B731">34.4</text>
    <text x="-2" y="91" font-family="'Segoe UI', sans-serif" font-size="10" fill="#FFFFFF">Madurai</text>
    <!-- Bikaner -->
    <rect x="0" y="108" width="270" height="28" rx="4" fill="#FF6B35" fill-opacity="0.45"/>
    <text x="275" y="127" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#F7B731">34.2</text>
    <text x="-2" y="127" font-family="'Segoe UI', sans-serif" font-size="10" fill="#FFFFFF">Bikaner</text>
    <!-- Tirunelveli -->
    <rect x="0" y="144" width="268" height="28" rx="4" fill="#FF6B35" fill-opacity="0.3"/>
    <text x="273" y="163" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="700" fill="#F7B731">34.2</text>
    <text x="-2" y="163" font-family="'Segoe UI', sans-serif" font-size="10" fill="#FFFFFF">Tirunelveli</text>
  </g>

  <!-- Map visual (simplified) -->
  <rect x="986" y="208" width="200" height="240" rx="8" fill="#0A1628" stroke="#1E3A5F" stroke-width="1"/>
  <text x="1000" y="232" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#FFFFFF">Temperature Map</text>
  <!-- India outline (simplified polygon) -->
  <polygon points="1060,260 1090,252 1120,265 1150,280 1160,310 1155,350 1140,385 1110,415 1090,425 1070,415 1045,390 1035,355 1040,315 1048,285" fill="#1E3A5F" stroke="#2D5F8A" stroke-width="1.5"/>
  <!-- City bubbles -->
